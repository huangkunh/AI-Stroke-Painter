<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Stroke Painter - 逐笔绘画回放</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Microsoft YaHei", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #888; margin-bottom: 24px; font-size: 14px; }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .btn-secondary { background: #2d2d44; color: #e0e0e0; }
    .btn-secondary:hover { background: #3d3d54; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .file-label {
      padding: 10px 20px;
      background: #2d2d44;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .file-label:hover { background: #3d3d54; }
    .file-label input { display: none; }
    .canvas-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    canvas {
      display: block;
      background: #f8ecdb;
    }
    .progress-bar {
      width: 640px;
      height: 6px;
      background: #2d2d44;
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.1s;
    }
    .info {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }
    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
    }
    .speed-control input { width: 100px; }
    .reference {
      margin-top: 20px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .reference img {
      max-width: 200px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .reference .label { font-size: 12px; color: #666; margin-top: 4px; text-align: center; }
  </style>
</head>
<body>
  <h1>AI Stroke Painter</h1>
  <p class="subtitle">将图片转化为逐笔绘画时序，在 Canvas 上回放每一笔</p>

  <div class="toolbar">
    <label class="file-label">
      📁 加载 output_strokes.json
      <input type="file" id="fileInput" accept=".json" />
    </label>
    <button class="btn btn-primary" id="playBtn" disabled>▶ 播放</button>
    <button class="btn btn-secondary" id="pauseBtn" disabled>⏸ 暂停</button>
    <button class="btn btn-secondary" id="resetBtn" disabled>↺ 重置</button>
    <div class="speed-control">
      速度
      <input type="range" id="speedSlider" min="1" max="50" value="8" />
      <span id="speedVal">8</span> 笔/帧
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="info" id="info">等待加载 JSON 文件…</div>

  <script src="engine.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const fileInput = document.getElementById('fileInput');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedVal = document.getElementById('speedVal');
    const progressFill = document.getElementById('progressFill');
    const info = document.getElementById('info');

    let jsonData = null;
    let renderPromise = null;
    let isPaused = false;
    let pauseResolve = null;

    speedSlider.addEventListener('input', () => {
      speedVal.textContent = speedSlider.value;
    });

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      info.textContent = '正在解析 JSON…';
      try {
        const text = await file.text();
        jsonData = JSON.parse(text);
        info.textContent = `已加载 ${jsonData.length} 条指令，点击「播放」开始逐笔回放`;
        playBtn.disabled = false;
        resetBtn.disabled = false;
      } catch (err) {
        info.textContent = 'JSON 解析失败: ' + err.message;
      }
    });

    playBtn.addEventListener('click', async () => {
      if (!jsonData) return;
      playBtn.disabled = true;
      pauseBtn.disabled = false;
      isPaused = false;
      const batch = parseInt(speedSlider.value);
      const result = await renderPainting(jsonData, canvas, {
        animate: true,
        batch: batch,
        background: '#f8ecdb',
        onProgress: (done, total) => {
          progressFill.style.width = (done / total * 100) + '%';
          info.textContent = `逐笔绘制中… ${done} / ${total} 条指令`;
        }
      });
      info.textContent = `绘制完成！共 ${result.strokes} 条指令`;
      playBtn.disabled = false;
      pauseBtn.disabled = true;
    });

    resetBtn.addEventListener('click', () => {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#f8ecdb';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      progressFill.style.width = '0%';
      info.textContent = `已重置，点击「播放」重新绘制 ${jsonData ? jsonData.length : 0} 条指令`;
    });

    // 初始化画布背景
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f8ecdb';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
